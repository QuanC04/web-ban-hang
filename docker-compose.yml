services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-123456}
      MARIADB_DATABASE: ${DB_NAME:-web_ban_hang}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./be
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:${DB_ROOT_PASSWORD:-123456}@db:3306/${DB_NAME:-web_ban_hang}?allowPublicKeyRetrieval=true
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      PORT: 3000
      NODE_ENV: production
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-placeholder}
      CLOUDFLARE_ACCESS_KEY_ID: ${CLOUDFLARE_ACCESS_KEY_ID:-placeholder}
      CLOUDFLARE_SECRET_ACCESS_KEY: ${CLOUDFLARE_SECRET_ACCESS_KEY:-placeholder}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-placeholder}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-http://localhost}
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./fe
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mariadb_data:
