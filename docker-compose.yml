services:
  mysql:
    image: mysql:8.0
    container_name: web-ban-hang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: web_ban_hang
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./be
    container_name: web-ban-hang-backend
    restart: unless-stopped
    depends_on:
      - mysql
    env_file:
      - ./be/.env
    environment:
      DATABASE_URL: mysql://root:123456@mysql:3306/web_ban_hang?allowPublicKeyRetrieval=true
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./fe
    container_name: web-ban-hang-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - "5173:5173"

volumes:
  mysql_data:
